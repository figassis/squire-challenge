name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
          POSTGRES_DB: ledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledger -d ledger"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    env:
      DATABASE_URL: postgres://ledger:ledger@127.0.0.1:5432/ledger?sslmode=disable

    defaults:
      run:
        working-directory: challenge

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: challenge/go.mod
          cache-dependency-path: challenge/go.sum

      - run: go test -race ./...
